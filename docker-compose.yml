services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount trained model artifacts into the container at runtime.
      # Run `make train && make tune` before `make docker-run`.
      - ./checkpoints:/app/checkpoints
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
